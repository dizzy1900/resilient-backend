[pytest]
# Pytest configuration for resilient-backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Warnings
    -W ignore::DeprecationWarning
    # Asyncio mode
    --asyncio-mode=auto

# Coverage settings (when using pytest-cov)
[coverage:run]
source = .
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */env/*
    setup.py
    */site-packages/*
    train_*.py
    generate_*.py
    verify_requirements.py
    debug_*.py
    troubleshoot_*.py
    mock_data.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    # Standard pragma
    pragma: no cover
    # Debug-only code
    def __repr__
    # Defensive programming
    raise AssertionError
    raise NotImplementedError
    # Non-runnable code
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
    # Type checking blocks
    if typing.TYPE_CHECKING:

[coverage:html]
directory = htmlcov
